services:
  frontend:
    build:
      context: ../../frontend/MAS.Payments.Client
    ports:
      - "5050:80"
    depends_on:
      - mas-payments

  mas-payments:
    build: .
    expose:
      - "80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Pooling=true;Database=prt;Username=devw;Password=123;Timeout=5;

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: prt
      POSTGRES_USER: devw
      POSTGRES_PASSWORD: 123
    ports:
      - "5401:5432"
    volumes:
      - p_payments:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devw -d prt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  p_payments:
